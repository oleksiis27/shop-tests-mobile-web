name: Mobile Web Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8:00 UTC
  workflow_dispatch:

env:
  SHOP_APP_REPO: ${{ github.repository_owner }}/shop-app
  BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
  BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

jobs:
  mobile-tests:
    name: "${{ matrix.platform }} - ${{ matrix.device }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            device: "Samsung Galaxy S23"
            os_version: "13.0"
            browser: chrome
          - platform: ios
            device: "iPhone 15"
            os_version: "17"
            browser: safari

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Checkout shop-app
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SHOP_APP_REPO }}
          path: shop-app

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Start shop-app with Docker Compose
        working-directory: shop-app
        run: |
          docker compose up -d
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/api/health | grep -q "ok"; then
              echo "Backend is ready!"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done

      - name: Verify shop-app is running
        run: |
          curl -f http://localhost:8000/api/health
          curl -f http://localhost:3000 -o /dev/null -s

      - name: Set up BrowserStack Local
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: start
          local-identifier: github-${{ github.run_id }}-${{ matrix.platform }}

      - name: Run mobile tests
        run: |
          ./gradlew test \
            -Drun.mode=browserstack \
            -Dplatform=${{ matrix.platform }} \
            -Ddevice="${{ matrix.device }}" \
            -Dos_version=${{ matrix.os_version }} \
            -Dbrowser=${{ matrix.browser }} \
            -Dbase.url=http://localhost:3000 \
            -Dapi.url=http://localhost:8000 \
            -Dbrowserstack.local=true \
            -Dbrowserstack.localIdentifier=github-${{ github.run_id }}-${{ matrix.platform }} \
            -Dbrowserstack.build="CI #${{ github.run_number }} - ${{ matrix.platform }}"

      - name: Stop BrowserStack Local
        if: always()
        uses: browserstack/github-actions/setup-local@master
        with:
          local-testing: stop

      - name: Stop shop-app
        if: always()
        working-directory: shop-app
        run: docker compose down

      - name: Load Allure test report history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Allure history
        if: always()
        run: |
          mkdir -p allure-results/history
          cp -r gh-pages/${{ matrix.platform }}/history/* allure-results/history/ 2>/dev/null || true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history/${{ matrix.platform }}

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          destination_dir: ${{ matrix.platform }}

      - name: Upload Allure results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.platform }}
          path: allure-results/
          retention-days: 30

      - name: Post Allure report link
        if: always() && github.ref == 'refs/heads/main'
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "[${{ matrix.platform }} report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ matrix.platform }}/)" >> $GITHUB_STEP_SUMMARY
